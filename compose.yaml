name: governed-sdlc-hello-world

services:
  db:
    build:
      context: ./db
    environment:
      POSTGRES_DB: ${DB_NAME:-hello_world}
      POSTGRES_USER: ${DB_USER:-hello_world}
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hello_world}
      DB_USER: ${DB_USER:-hello_world}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  web:
    build:
      context: ./web
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

volumes:
  postgres-data:

