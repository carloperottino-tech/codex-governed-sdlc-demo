<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A customer-neutral three-tier Hello World demonstration"
    />
    <title>Governed SDLC Hello World</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-labelledby="page-title">
        <p class="eyebrow">Three-tier application</p>
        <h1 id="page-title">Governed SDLC demo</h1>
        <div id="greeting" class="status status--loading" role="status" aria-live="polite">
          <span class="spinner" aria-hidden="true"></span>
          <span>Loading greeting…</span>
        </div>
        <button id="retry" class="retry" type="button" hidden>Try again</button>
        <p class="path">Browser → Nginx → FastAPI → PostgreSQL</p>
      </section>
    </main>
  </body>
</html>
